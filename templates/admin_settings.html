{% extends "base.html" %}
{% block title %}Settings - Smart Timetable System{% endblock %}
{% block page_title %}System Settings{% endblock %}

{% block content %}
<div class="builder-layout">
    <div style="flex: 1;">
        <div class="panel">
            <div class="panel-header">
                <h3 class="panel-title"><i class="fa-solid fa-building-columns text-primary"></i> <span data-i18n="sys_settings">University Settings</span></h3>
            </div>
            <div class="panel-body">
                <div class="form-group">
                    <label class="form-label text-muted" data-i18n="uni_name">University Name</label>
                    <input type="text" class="form-control" value="{{ university.name if university else '' }}">
                </div>
                <div class="form-group">
                    <label class="form-label text-muted" data-i18n="domain">Domain</label>
                    <input type="text" class="form-control" value="{{ university.domain if university else '' }}">
                </div>
                <div class="form-group">
                    <label class="form-label text-muted" data-i18n="address">Address</label>
                    <input type="text" class="form-control" value="{{ university.address if university else '' }}">
                </div>
                <div class="form-group">
                    <label class="form-label text-muted" data-i18n="founded">Founded Year</label>
                    <input type="text" class="form-control" value="{{ university.founded if university else '' }}">
                </div>
                <button class="btn btn-primary" style="margin-top: 16px;" data-i18n="save_changes">Save Changes</button>
            </div>
        </div>
    </div>
    <div style="width: 320px;">
        <div class="panel">
            <div class="panel-header">
                <h3 class="panel-title"><i class="fa-solid fa-server text-primary"></i> <span data-i18n="sys_details">System Details</span></h3>
            </div>
            <div class="panel-body">
                <p class="text-muted" style="margin-bottom: 12px;"><strong data-i18n="version">Version</strong>: v1.0.0-capstone</p>
                <p class="text-muted" style="margin-bottom: 12px;"><strong data-i18n="database">Database</strong>: SQLite (Local)</p>
                <p class="text-muted" style="margin-bottom: 12px;"><strong data-i18n="last_backup">Last Backup</strong>: <span data-i18n="today">Today</span></p>
                
                <hr style="border: 0; border-top: 1px solid var(--border); margin: 20px 0;">
                
                <button class="btn btn-outline" style="width: 100%; color: var(--danger); border-color: var(--danger);">
                    <i class="fa-solid fa-database"></i> <span data-i18n="reset_db">Reset Database</span>
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
